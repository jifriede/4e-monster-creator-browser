<!DOCTYPE html>
<html>
    <head>
        <title>4e Monster Maker</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <form action="monster_block.html" method="get">
            <p>
                Level: <input type="number" name="level" min="1" max="30">
            </p>
            <p>
                Role:
                <br><input type="radio" name="role" value="Soldier" checked>
                <label for="role">Soldier</label>
                <br><input type="radio" name="role" value="Brute">
                <label for="role">Brute</label>
                <br><input type="radio" name="role" value="Controller">
                <label for="role">Controller</label>
                <br><input type="radio" name="role" value="Lurker">
                <label for="role">Lurker</label>
                <br><input type="radio" name="role" value="Skirmisher">
                <label for="role">Skirmisher</label>
                <br><input type="radio" name="role" value="Artillery">
                <label for="role">Artillery</label>
            </p>
            <p>
                Group:
                <br><input type="radio" name="group" value="Standard" checked>
                <label for="group">Standard</label>
                <br><input type="radio" name="group" value="Elite">
                <label for="group">Elite</label>
                <br><input type="radio" name="group" value="Solo">
                <label for="group">Solo</label>
                <br><input type="radio" name="group" value="Minion">
                <label for="group">Minion</label>
            </p>
            <p>
                <input type="submit" value="Create Monster">
            </p>
        </form>
    </body>
</html>
